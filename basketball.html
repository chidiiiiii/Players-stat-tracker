<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Basketball Player Tracker</title>
  <link rel="stylesheet" href="basketball.css">
</head>
<body>

  <header>
    <h1>🏀 Player Stats Tracker</h1>
    <p class="subtitle">Track performance, sort stats, and explore your team</p>
  </header>

  <section class="controls">
    <button id="sortBtn">Sort by Points</button>

    <select id="filterPosition">
      <option value="all">All Positions</option>
      <option value="G">Guard</option>
      <option value="F">Forward</option>
      <option value="C">Center</option>
    </select>
  </section>

  <main>
    <div id="players-container"></div>
  </main>

  <section class="tests">
    <button id="runTests">Run Tests</button>
    <div id="test-results"></div>
  </section>

  <footer>
    <p>Basketball Stats App • Web Scripting Project</p>
  </footer>

  <script src="basketball.js"></script>
</body>
</html>
